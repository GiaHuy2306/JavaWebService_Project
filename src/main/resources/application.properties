spring.application.name=project

# Datasource config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project_java_web_service?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

# JPA config
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis config for TokenBlacklist
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging config
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} -  %highlight(%-5level) - %cyan(%logger{50}) - %green(%msg%n)
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.project=INFO

# Upload config
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# JWT config
jwt-secret=${JWT_SECRET:daylachuoibimatduocsudungdetaorajwt}
jwt-expired=${JWT_EXPIRED:900000}
jwt-refresh-expired=${JWT_REFRESH_EXPIRED:604800000}

# Mail config for forgot password
# Set app.mail.enabled=true and fill SMTP information to send temporary passwords.
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
